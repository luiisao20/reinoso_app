<div class="border-b-bdcolor border-b-2 p-4">
  <div class="grid grid-cols-3 items-center">
    <ng-icon
      name="matDirectionsRun"
      size="50"
      color="#49B1E9"
      class="border border-bdcolor rounded-full"
    />
    <div class="justify-items-start">
      <h2 class="font-semibold text-base">{{ item.lastName }} {{ item.name }}</h2>
      <h2 class="font-thin text-sm">{{ item.phone }}</h2>
    </div>
    <button (click)="onSelectToDelete(item)" class="justify-items-end right-0">
      <ng-icon name="matDelete" size="30" color="red" />
    </button>
  </div>
</div>
