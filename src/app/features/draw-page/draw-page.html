<h2 class="text-center mt-4 font-semibold text-xl">Sorteos realizados</h2>

<div class="mb-8 p-4 w-full mt-4 flex flex-col gap-4">
  @if (drawList().length > 0) {
    @for (item of drawList(); track item.id) {
      <app-draw-component [draw]="item"></app-draw-component>
    }
  } @else {
    <p class="text-center p-4">Cargando sorteos...</p>
  }
</div>
